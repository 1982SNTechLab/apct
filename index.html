<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download do Aplicativo</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #4b0082, #8a2be2, #ff4500);
      overflow:hidden;
    }

    .container{
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding:40px 30px;
      border-radius:30px;
      text-align:center;
      width:90%;
      max-width:500px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.15);
    }

    .logo{
      width:120px;
      margin-bottom:25px;
      border-radius:25px;
      box-shadow:0 5px 20px rgba(0,0,0,0.25);
    }

    h1{
      color:white;
      font-size:28px;
      margin-bottom:30px;
      line-height:1.4;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .download-btn{
      display:inline-block;
      text-decoration:none;
      background: linear-gradient(135deg, #ffffff, #f1f1f1);
      color:#5a189a;
      font-size:20px;
      font-weight:bold;
      padding:18px 35px;
      border-radius:18px;
      transition:0.3s ease;
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    .download-btn:hover{
      transform:translateY(-4px) scale(1.03);
      background:white;
      box-shadow:0 12px 25px rgba(0,0,0,0.35);
    }

    .download-btn:active{
      transform:scale(0.98);
    }

    .info{
      margin-top:18px;
      color:rgba(255,255,255,0.85);
      font-size:14px;
    }

    @media(max-width:600px){
      h1{
        font-size:22px;
      }

      .download-btn{
        width:100%;
        font-size:18px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Substitua "logo.png" pela imagem do seu ícone -->
    <img src="logo.png" alt="Logo Aplicativo" class="logo">

    <h1>
      Baixe aqui o Seu Aplicativo da Tabela de Turno Fixo Inteligente
    </h1>

    <!-- Substitua o link abaixo pelo link real do seu arquivo -->
    <a href=https://drive.google.com/file/d/1NSinZno4p9v-pvoBMSS43cDELfJA6fxZ/view?usp=drivesdk class="download-btn" download>
      📥 Baixar Aplicativo
    </a>

    <div class="info">
      Clique no botão para iniciar o download.
    </div>

  </div>

</body>
</html>
